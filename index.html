    <script>
      (function() {
        // Safe storage helpers to completely prevent browser security issues inside sandboxed iframes on mobile
        function safeGetStorage(type, key) {
          try {
            var storage = type === 'session' ? window.sessionStorage : window.localStorage;
            return storage ? storage.getItem(key) : null;
          } catch (e) {
            return null;
          }
        }
        function safeSetStorage(type, key, value) {
          try {
            var storage = type === 'session' ? window.sessionStorage : window.localStorage;
            if (storage) {
              storage.setItem(key, value);
            }
          } catch (e) {}
        }

        // Early theme detection to avoid flashing white on mobile load
        try {
          var saved = safeGetStorage("local", "pdfminty-theme");
          if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        } catch (e) {}

        // Global early error handler to detect chunk load errors / script errors and force recovery reload
        window.addEventListener('error', function(event) {
          try {
            var msg = event.message || "";
            var reason = (event.error && event.error.message) || "";
            var errorMsg = (msg + " " + reason).toLowerCase();

            // We should ONLY catch genuine dynamic chunk / JS module script loading failures.
            // Avoid matching general "load" or generic assets load issues which would cause infinite reloads.
            if (
              errorMsg.indexOf('chunkloaderror') > -1 ||
              errorMsg.indexOf('loading chunk') > -1 ||
              (errorMsg.indexOf('dynamically imported') > -1 && errorMsg.indexOf('module') > -1) ||
              (errorMsg.indexOf('failed to fetch') > -1 && errorMsg.indexOf('module') > -1) ||
              (errorMsg.indexOf('import') > -1 && errorMsg.indexOf('module') > -1) ||
              errorMsg.indexOf('failed to load module script') > -1 ||
              errorMsg.indexOf('error loading dynamically imported module') > -1
            ) {
              var now = Date.now();
              var lastReload = parseInt(safeGetStorage('session', 'pdfminty-last-chunk-reload') || '0', 10);
              // Allow reload only if it has been more than 15 seconds since the last chunk reload
              if (now - lastReload > 15000) {
                safeSetStorage('session', 'pdfminty-last-chunk-reload', now.toString());
                console.warn('[Failsafe] Chunk load failure detected. Clearing cache and reloading...');
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for (var i = 0; i < registrations.length; i++) {
                      registrations[i].unregister();
                    }
                    window.location.reload();
                  }).catch(function() {
                    window.location.reload();
                  });
                } else {
                  window.location.reload();
                }
              } else {
                console.error('[Failsafe] Chunk loading failure occurred again too soon. Reload ignored to prevent loop.');
              }
            }
          } catch (err) {}
        });

        // Early language detection & loading skeleton localization
        try {
          var savedLang = safeGetStorage("local", "pdfminty-lang");
          var browserLang = navigator.language || navigator.userLanguage || "en";
          var activeLang = savedLang || browserLang.substring(0, 2);

          // Configure the load message either on DOM load or immediately if DOM is ready
          function configureMessage() {
            try {
              var loadingEl = document.querySelector(".loading-text");
              if (loadingEl) {
                if (activeLang === "bn") {
                  loadingEl.textContent = "পিডিএফমিন্টি লোড হচ্ছে...";
                } else {
                  loadingEl.textContent = "Loading PDFMinty...";
                }
              }
            } catch (err) {}
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", configureMessage);
          } else {
            configureMessage();
          }

          // Central Failsafe Timer to handle loading timeout on slow networks
          // We increase the timer to 30 seconds and ONLY display an assistance message to the user:
          // We DO NOT force an automatic reload, because reloading repeatedly during slow downloads creates endless loops.
          setTimeout(function() {
            try {
              if (document.getElementById('loading-skeleton')) {
                console.warn('[Failsafe] App is taking some time to load on this connection.');
                var loadingText = document.querySelector('.loading-text');
                if (loadingText) {
                  loadingText.textContent = "Taking longer than usual... Try clearing browser cache or toggle Desktop site.";
                }
              }
            } catch (err) {}
          }, 30000);
        } catch (e) {}
      })();
    </script>
    <!-- FIX: Google Fonts render-blocking সরানো হয়েছে।
         আগে: <link rel="stylesheet"> — এটি page render block করে।
         এখন: rel="preload" + onload pattern — font async load হবে,
         page render আটকাবে না। Font আসার আগে system font দেখাবে। -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

      onload="this.onload=null;this.rel='stylesheet'"

    <style>
      /* Critical CSS for loading state — inline হওয়ায় render-blocking নয় */
      .loading-root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      html.dark .loading-root {
        background: #020617;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #e2e8f0;
        border-top-color: #10b981; /* beautiful emerald-500 tint */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      html.dark .loading-spinner {
        border-color: #1e293b;
        border-top-color: #34d399; /* emerald-400 */
      }
      .loading-text {
        margin-top: 16px;
        color: #64748b;
        font-size: 14px;
        font-weight: 500;
      }
      html.dark .loading-text {
        color: #94a3b8;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* FOUC prevention */
      html { background-color: #f8fafc; }
      html.dark { background-color: #020617; }
    </style>
