    <style>
      /* Critical CSS for loading state — inline হওয়ায় render-blocking নয় */
      .loading-root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      html.dark .loading-root {
        background: #020617;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #e2e8f0;
        border-top-color: #10b981; /* beautiful emerald-500 tint */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      html.dark .loading-spinner {
        border-color: #1e293b;
        border-top-color: #34d399; /* emerald-400 */
      }
      .loading-text {
        margin-top: 16px;
        color: #64748b;
        font-size: 14px;
        font-weight: 500;
      }
      html.dark .loading-text {
        color: #94a3b8;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* FOUC prevention */
      html { background-color: #f8fafc; }
      html.dark { background-color: #020617; }
    </style>
