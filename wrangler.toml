name = "pdfminty"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
ENVIRONMENT = "production"
USER_AGENT = "PDFMinty-Document-Analyzer/1.0"
GEMINI_MODEL = "gemini-2.0-flash"
# GEMINI_API_KEY is a secure secret. Do NOT place its plaintext value here.
# Bind it in production via standard Cloudflare command-line tools:
# wrangler pages secret put GEMINI_API_KEY
# Access it securely inside the Worker via env.GEMINI_API_KEY.

# Production Environment Config
[env.production]
[[env.production.kv_namespaces]]
binding = "RATELIMIT_KV"
id = "a43016cede9e4e92bc4ee8776b952cfb"

# Preview Environment Config
[env.preview]
[[env.preview.kv_namespaces]]
binding = "RATELIMIT_KV"
id = "your-preview-kv-id"

