name = "pdfminty"
pages_build_output_dir = "dist"
compatibility_date = "2026-05-24"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pdfminty-prod"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_YOUR_KV_ID"

[vars]
ENVIRONMENT = "production"
NODE_ENV = "production"
