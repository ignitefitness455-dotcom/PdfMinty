name = "pdfminty"
compatibility_date = "2024-04-01"
# For Cloudflare Pages, we deploy via `pages_build_output_dir`
pages_build_output_dir = "dist"

# Rate Limit KV Binding mapped to PDFMINTY_KV as expected by functions/utils/rateLimit.ts
[[kv_namespaces]]
binding = "PDFMINTY_KV"
# TODO: Replace the 'id' below with your actual KV namespace ID after running:
# wrangler kv:namespace create PDFMINTY_KV
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
