name = "pdfminty"
pages_build_output_dir = "dist"
compatibility_date = "2025-06-25"
compatibility_flags = ["nodejs_compat"]

# KV namespace for rate-limiting and form-submission fallback storage.
# Create the namespace in the Cloudflare dashboard (Workers & Pages > KV)
# and paste the real ID below. The preview_id is used by `wrangler pages dev`.
[[kv_namespaces]]
binding = "RATELIMIT_KV"
id = "a43016cede9e4e92bc4ee8776b952cfb"
# Create a separate preview namespace in Cloudflare dashboard and paste its ID below.
# This prevents preview deployments from polluting production rate-limit counters.
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"
